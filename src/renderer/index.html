<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw 助手</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <div class="app">
    <!-- <header class="header">
        <h1 class="title">OpenClaw 助手</h1>
      </header> -->

    <section id="installerCard" class="card hidden">
      <h2>一键安装</h2>
      <div class="field">
        <div class="label">自定义 Base URL</div>
        <input id="customBaseUrl" type="text" value="https://sub.yeelovo.com/v1" />
      </div>
      <div class="field">
        <div class="label">模型 ID</div>
        <input id="customModelId" type="text" value="gpt-5.4" />
      </div>
      <div class="field">
        <div class="label">CUSTOM_API_KEY</div>
        <input id="customApiKey" type="password" placeholder="粘贴你的 API Key（仅用于执行 openclaw onboard）" />
      </div>
      <div class="actions">
        <button id="installBtn" type="button">开始安装</button>
        <button id="cancelBtn" class="secondary" type="button" disabled>取消</button>
      </div>
    </section>

    <section id="dashboardCard" class="card hidden">
      <h2>控制台</h2>
      <div class="row" style="justify-content: space-between">
        <div class="row">
          <div id="versionPill" class="pill">version: -</div>
          <div id="gatewayStatusPill" class="pill">网关：检测中…</div>
          <button id="refreshBtn" class="icon-btn" style="
                padding: 6px 12px;
                font-size: 13px;
                background: transparent;
                border: 1px solid var(--border);
                border-radius: 20px;
              " type="button">
            ↻
          </button>
        </div>
        <button id="openDashboardBtn" type="button">进入控制台</button>
      </div>
      <div class="featureGrid">
        <div class="featureCard">
          <div class="featureHeader">
            <div class="featureTitle">网关服务</div>
            <div class="featureActions">
              <button id="gatewayRestartBtn" class="secondary" style="padding: 6px 12px; font-size: 12px" type="button">
                重启
              </button>
              <button id="gatewayStopBtn" class="secondary" style="padding: 6px 12px; font-size: 12px" type="button">
                停止
              </button>
              <button id="gatewayStartBtn" style="padding: 6px 12px; font-size: 12px" type="button">
                启动
              </button>
            </div>
          </div>
          <div class="featureDesc">后台本地服务，提供网络通讯支持。</div>
        </div>

        <div class="featureCard">
          <div class="featureHeader">
            <div class="featureTitle">健康检查</div>
            <div class="featureActions">
              <button id="doctorBtn" class="secondary" style="padding: 6px 12px; font-size: 12px" type="button">
                一键修复
              </button>
            </div>
          </div>
          <div class="featureDesc" style="margin-bottom: auto">
            检查配置与服务状态，修复常见问题。
          </div>
        </div>

        <div class="featureCard">
          <div class="featureHeader">
            <div class="featureTitle">检查更新</div>
            <div class="featureActions">
              <button id="updateBtn" class="secondary" style="padding: 6px 12px; font-size: 12px" type="button">
                更新
              </button>
            </div>
          </div>
          <div class="featureDesc">当前选用版本频道：</div>
          <select id="updateChannel" style="padding: 8px 12px; font-size: 13px; margin-top: auto">
            <option value="stable" selected>稳定版（stable）</option>
            <option value="beta">测试版（beta）</option>
            <option value="dev">开发版（dev）</option>
          </select>
        </div>

        <div class="featureCard">
          <div class="featureHeader">
            <div class="featureTitle">卸载及清理</div>
            <div class="featureActions">
              <button id="uninstallBtn" class="danger" style="
                    padding: 6px 12px;
                    font-size: 12px;
                    background: rgba(255, 59, 48, 0.1);
                    color: var(--danger);
                    border: 1px solid rgba(255, 59, 48, 0.3);
                    box-shadow: none;
                  " type="button">
                彻底卸载
              </button>
            </div>
          </div>
          <div class="featureDesc" style="margin-bottom: auto">
            清理服务和命令行工具，不可逆转。
          </div>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="row progressRow">
        <h2 style="margin: 0">进度</h2>
        <label class="toggle inline" style="margin-left: auto">
          <input id="showLogs" type="checkbox" checked />
          显示日志
        </label>
      </div>
      <div id="stageText" class="stage" style="margin-top: 12px">等待开始…</div>
      <div class="progress">
        <div id="progressBar" class="progressBar" style="width: 0%"></div>
      </div>
      <div class="row progressRow" style="margin-top: 8px">
        <div id="progressText" class="progressText" style="margin: 0">0%</div>
        <button id="stopBtn" class="secondary" style="padding: 6px 14px; font-size: 13px" type="button" disabled>
          取消当前任务
        </button>
      </div>
    </section>

    <section id="logCard" class="card hidden">
      <h2>日志</h2>
      <div id="log" class="log logHtml" role="log" aria-live="polite"></div>
    </section>
  </div>

  <div id="modalOverlay" class="modalOverlay hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div id="modalTitle" class="modalTitle">确认</div>
      <div id="modalBody" class="modalBody"></div>
      <div class="modalActions">
        <button id="modalCancelBtn" class="secondary" type="button">取消</button>
        <button id="modalConfirmBtn" type="button">确定</button>
      </div>
    </div>
  </div>

  <script src="./boot.js"></script>
  <script src="./installer.js"></script>
  <script src="./renderer.js"></script>
</body>

</html>
