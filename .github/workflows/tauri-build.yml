name: tauri-build

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "tauri/**"
    tags:
      - "*"
  pull_request:
    branches:
      - main
      - "tauri/**"

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundles: nsis
          - os: macos-latest
            bundles: dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri
        run: npm run build -- --bundles ${{ matrix.bundles }} --verbose

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bundles-${{ matrix.os }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/${{ matrix.bundles }}/**
            src-tauri/target/release/*.exe
            src-tauri/target/release/*.msi

  release:
    name: release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            .github/workflows/tauri-build.yml
            scripts/macos-app-first-aid.command
            release-assets/**/*
